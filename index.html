<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Emoji Drift</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #07071a;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    canvas {
      display: block;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    #hud {
      position: fixed;
      top: env(safe-area-inset-top, 16px);
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.92);
      font: 600 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      pointer-events: none;
      z-index: 10;
      padding: 7px 20px;
      background: rgba(0, 0, 0, 0.42);
      border-radius: 18px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      white-space: nowrap;
      letter-spacing: 0.3px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #hud.visible { opacity: 1; }

    /* Pause button */
    #btn-pause {
      position: fixed;
      top: env(safe-area-inset-top, 14px);
      right: 16px;
      width: 40px; height: 40px;
      border: none; border-radius: 12px;
      background: rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.85);
      font-size: 18px;
      cursor: pointer;
      z-index: 10;
      display: none;
      align-items: center; justify-content: center;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, opacity 0.1s;
    }
    #btn-pause.visible { display: flex; }
    #btn-pause:active { transform: scale(0.88); }

    /* Overlay */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.62);
      z-index: 20;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    #overlay.show { display: flex; }

    /* Shared panel */
    .panel {
      background: rgba(12, 12, 30, 0.97);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 26px;
      padding: 36px 28px;
      text-align: center;
      max-width: 300px;
      width: 88%;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .panel-wide {
      max-width: 440px;
      width: 94%;
      max-height: 82vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    @keyframes popIn {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .p-icon  { font-size: 58px; line-height: 1; margin-bottom: 10px; }
    .p-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
    .p-sub   { font-size: 13px; color: rgba(255,255,255,0.42); margin-bottom: 20px; letter-spacing: 0.3px; }
    .p-stat  { font-size: 60px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .p-label { font-size: 13px; color: rgba(255,255,255,0.42); margin-bottom: 24px; letter-spacing: 0.4px; }

    .btn-action {
      font-size: 17px; font-weight: 600;
      padding: 15px 0;
      width: 100%;
      border: none; border-radius: 14px;
      background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
      color: #fff; cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, opacity 0.1s;
      letter-spacing: 0.3px;
      margin-bottom: 10px;
    }
    .btn-action:last-child { margin-bottom: 0; }
    .btn-action:active { transform: scale(0.93); opacity: 0.82; }

    .btn-ghost {
      font-size: 15px; font-weight: 500;
      padding: 12px 0;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.78);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, opacity 0.1s;
      letter-spacing: 0.3px;
      margin-bottom: 10px;
    }
    .btn-ghost:last-child { margin-bottom: 0; }
    .btn-ghost:active { transform: scale(0.93); opacity: 0.72; }

    /* Emoji grids (collection panel) */
    .emoji-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 16px;
    }
    .emoji-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      padding: 4px 2px;
    }
    .emoji-cell {
      position: relative;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.08);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s;
      flex-shrink: 0;
    }

    /* Emoji text input (settings) */
    .emoji-input-wrap {
      margin: 16px 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    #head-input {
      font-size: 56px;
      line-height: 1;
      width: 96px; height: 96px;
      text-align: center;
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 20px;
      color: #fff;
      caret-color: transparent;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #head-input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.35);
    }
    .emoji-input-hint {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.3px;
    }

    /* Rarity dot indicator */
    .rarity-dot {
      position: absolute;
      bottom: 3px; right: 3px;
      width: 7px; height: 7px;
      border-radius: 50%;
      pointer-events: none;
    }
    .r-common    { background: #9ca3af; }
    .r-uncommon  { background: #4ade80; }
    .r-rare      { background: #60a5fa; }
    .r-epic      { background: #c084fc; }
    .r-legendary { background: #facc15; box-shadow: 0 0 5px #facc15; }

    /* Rarity legend row (above collection grid) */
    .rarity-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 5px 10px;
      justify-content: center;
      padding: 0 4px 12px;
      width: 100%;
    }
    .rarity-legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.2px;
    }
    .rarity-legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .rarity-legend-dot.rl-legendary { background: #facc15; box-shadow: 0 0 4px #facc15; }
    .rarity-legend-dot.rl-epic      { background: #c084fc; }
    .rarity-legend-dot.rl-rare      { background: #60a5fa; }
    .rarity-legend-dot.rl-uncommon  { background: #4ade80; }
    .rarity-legend-dot.rl-common    { background: #9ca3af; }

    /* Emoji detail panel */
    #panel-emoji-detail .detail-emoji {
      font-size: 96px;
      line-height: 1;
      margin-bottom: 16px;
    }
    #panel-emoji-detail .detail-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    #panel-emoji-detail .detail-rarity-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 16px;
      border-radius: 20px;
      margin-bottom: 24px;
      border: 1.5px solid;
    }
    .emoji-cell {
      cursor: pointer;
    }

    #hint {
      position: fixed;
      bottom: env(safe-area-inset-bottom, 22px);
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.35);
      font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      pointer-events: none;
      z-index: 10;
      transition: opacity 1.8s ease;
      white-space: nowrap;
      opacity: 0;
    }
    #hint.visible { opacity: 1; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud"><span id="hud-head">🐍</span>&nbsp;&nbsp;<span id="hud-len">1</span></div>
  <div id="hint">✦ Touch and drag to steer ✦</div>
  <button id="btn-pause">⏸</button>

  <div id="overlay" class="show">

    <!-- Start panel -->
    <div id="panel-start" class="panel">
      <div class="p-icon" id="start-face">🐍</div>
      <div class="p-title">Emoji Drift</div>
      <div class="p-sub">Collect emojis · Grow your snake</div>
      <button id="btn-start" class="btn-action">▶ Start</button>
      <button id="btn-collection" class="btn-ghost">🎒 My Collection</button>
      <button id="btn-settings" class="btn-ghost">⚙️ Settings</button>
    </div>

    <!-- Game over panel -->
    <div id="panel-over" class="panel" style="display:none">
      <div class="p-icon" id="go-icon">💥</div>
      <div class="p-title">Game Over</div>
      <div class="p-stat" id="go-stat">0</div>
      <div class="p-label">unique emoji types</div>
      <button id="btn-restart" class="btn-action">▶ Play Again</button>
      <button id="btn-to-menu" class="btn-ghost">🏠 Main Menu</button>
    </div>

    <!-- Pause panel -->
    <div id="panel-pause" class="panel" style="display:none">
      <div class="p-icon">⏸</div>
      <div class="p-title">Paused</div>
      <button id="btn-resume" class="btn-action">▶ Resume</button>
      <button id="btn-quit" class="btn-ghost">🏠 Quit to Menu</button>
    </div>

    <!-- Collection panel -->
    <div id="panel-collection" class="panel panel-wide" style="display:none">
      <div class="p-title">🎒 My Collection</div>
      <div class="p-sub" id="coll-count">0 emojis collected</div>
      <div class="emoji-scroll">
        <div class="emoji-grid" id="coll-grid"></div>
      </div>
      <button id="btn-coll-back" class="btn-ghost">← Back</button>
    </div>

    <!-- Emoji detail panel -->
    <div id="panel-emoji-detail" class="panel" style="display:none">
      <div class="detail-emoji" id="detail-emoji-char"></div>
      <div class="detail-name" id="detail-emoji-name"></div>
      <div class="detail-rarity-badge" id="detail-rarity-badge"></div>
      <button id="btn-detail-back" class="btn-ghost">← Back to Collection</button>
    </div>

    <!-- Settings panel -->
    <div id="panel-settings" class="panel" style="display:none">
      <div class="p-title">⚙️ Settings</div>
      <div class="p-sub">Type or paste any emoji as your snake's head</div>
      <div class="emoji-input-wrap">
        <input id="head-input" type="text" inputmode="text" autocomplete="off"
               autocorrect="off" autocapitalize="off" spellcheck="false"
               placeholder="😀" maxlength="10" />
        <span class="emoji-input-hint">Only the first emoji will be used</span>
      </div>
      <button id="btn-settings-back" class="btn-ghost">← Back</button>
    </div>

  </div>

  <script type="module" src="js/game.js"></script>
</body>
</html>
